<div class="modal-header">
  <span class="modal-title">🏦 Pagamento via PIX</span>
  <button class="modal-close" onclick="closeModal('modal-pix-view')">×</button>
</div>
<div style="padding: 20px; text-align: center;">
  <div id="pix-qr-container" style="background:#fff; padding:15px; border-radius:12px; display:inline-block; margin-bottom:20px;">
    <!-- O QR Code será injetado aqui via JS -->
    <div style="width:200px; height:200px; display:flex; align-items:center; justify-content:center; border:2px dashed #e2e8f0; color:#94a3b8;">
      Gerando QR Code...
    </div>
  </div>
  
  <div style="text-align:left; background:var(--bg2); padding:16px; border-radius:8px; border:1px solid var(--border); margin-bottom:20px;">
    <div style="font-size:12px; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px;">Chave Copia e Cola</div>
    <div id="pix-string-display" style="font-family:monospace; font-size:13px; word-break:break-all; color:var(--text); max-height:80px; overflow-y:auto; padding-right:8px;">
      ...
    </div>
    <button class="btn btn-secondary btn-sm" style="width:100%; margin-top:12px;" onclick="copyPixString()">📋 Copiar Chave</button>
  </div>

  <div style="font-size:14px; color:var(--text); margin-bottom:24px;">
    Destinatário: <b id="pix-dest-name">...</b><br>
    Valor: <b id="pix-dest-val" style="color:var(--green); font-size:18px;">...</b>
  </div>

  <div style="display:flex; gap:12px; justify-content:center;">
    <button class="btn btn-secondary" onclick="closeModal('modal-pix-view')">Fechar</button>
    <button class="btn btn-primary" style="background:var(--green); border-color:var(--green);" onclick="confirmPixPaid()">✅ Marcar como Pago</button>
  </div>
</div>

<script>
function copyPixString() {
  const str = document.getElementById('pix-string-display').textContent.trim();
  navigator.clipboard.writeText(str);
  alert('Chave PIX copiada com sucesso!');
}
</script>
