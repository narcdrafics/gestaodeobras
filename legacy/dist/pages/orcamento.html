<div class="page-header">
  <div class="page-title">Orçamento <small>Base de comparação financeira por obra</small></div>
  <button class="btn btn-primary" onclick="openModal('modal-orcamento')">+ Novo Item</button>
</div>
<div class="table-wrap">
  <div class="table-toolbar">
    <h3>Orçamento por Etapa</h3>
    <div class="toolbar-right">
      <input class="search-input" placeholder="Buscar..." oninput="filterTable('orc-tbody', this.value, [0,1,3])">
    </div>
  </div>
  <table>
    <thead><tr><th>Obra</th><th>Etapa</th><th>Tipo</th><th>Descrição</th><th>Unid.</th><th>Qtd.</th><th>Vl. Unit. Prev.</th><th>Vl. Total Prev.</th><th>Vl. Total Real.</th><th>Diferença</th><th>% Exec.</th><th>Ações</th></tr></thead>
    <tbody id="orc-tbody"></tbody>
  </table>
</div>
