<div class="page-header">
  <div class="page-title">Mov. Estoque <small>Registros de movimentação</small></div>
  <button class="btn btn-primary" onclick="openModal('modal-movest')">+ Nova Movimentação</button>
</div>
<div class="table-wrap">
  <div class="table-toolbar">
    <h3>Movimentação de Estoque</h3>
    <div class="toolbar-right">
      <input class="search-input" placeholder="Buscar..." oninput="filterTable('movest-tbody', this.value, [1,2,3])">
    </div>
  </div>
  <table>
    <thead><tr><th>Data</th><th>Cód. Mat.</th><th>Material</th><th>Obra</th><th>Tipo</th><th>Qtd.</th><th>Frente</th><th>Retirado por</th><th>Autorizado por</th><th>NF/Pedido</th><th>Val. Unit.</th><th>Val. Total</th><th>Obs.</th><th>Ações</th></tr></thead>
    <tbody id="movest-tbody"></tbody>
  </table>
</div>
