<input type="hidden" id="mv-edit-idx" value="-1">
<div class="modal-header"><span class="modal-title">🔄 Nova Movimentação</span><button class="modal-close" onclick="closeModal('modal-movest')">×</button></div>
<div class="form-grid">
  <div class="form-group"><label class="form-label">Data *</label><input type="date" class="form-control" id="mv-data"></div>
  <div class="form-group"><label class="form-label">Cód. Material *</label><select class="form-control" id="mv-mat" onchange="fillMatInfo()"></select></div>
  <div class="form-group"><label class="form-label">Material</label><input class="form-control" id="mv-matname" readonly></div>
  <div class="form-group"><label class="form-label">Obra</label><select class="form-control" id="mv-obra"></select></div>
  <div class="form-group"><label class="form-label">Tipo *</label>
    <select class="form-control" id="mv-tipo" onchange="toggleDestinoMov()"><option>Entrada</option><option>Saída</option><option>Transferência</option></select></div>
  <div class="form-group" id="grp-mv-destino" style="display:none"><label class="form-label" style="color:var(--accent);font-weight:bold;">Obra Destino *</label><select class="form-control" id="mv-destino-obra"></select></div>
  <div class="form-group"><label class="form-label">Qtd. *</label><input type="number" class="form-control" id="mv-qtd" value="1" oninput="calcMovTotal()"></div>
  <div class="form-group"><label class="form-label">Frente Serviço</label><input class="form-control" id="mv-frente" placeholder="Alvenaria"></div>
  <div class="form-group"><label class="form-label">Retirado por</label><input class="form-control" id="mv-retirado"></div>
  <div class="form-group"><label class="form-label">Autorizado por (Mestre)</label><input class="form-control" id="mv-autor"></div>
  <div class="form-group"><label class="form-label">NF/Pedido</label><input class="form-control" id="mv-nf"></div>
  <div class="form-group"><label class="form-label">Val. Unit. (R$)</label><input type="number" class="form-control" id="mv-vunit" oninput="calcMovTotal()"></div>
  <div class="form-group"><label class="form-label">Val. Total (R$)</label><input type="number" class="form-control" id="mv-vtotal" readonly></div>
  <div class="form-group form-full"><label class="form-label">Obs.</label><input class="form-control" id="mv-obs"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="closeModal('modal-movest')">Cancelar</button>
  <button class="btn btn-primary" onclick="saveMovEstoque()">Salvar</button>
</div>
