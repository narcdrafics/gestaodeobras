<div class="modal-header"><span class="modal-title">✅ Lançar Presença</span><button class="modal-close"
    onclick="closeModal('modal-presenca')">×</button></div>
<div style="background: rgba(var(--accent-rgb), 0.05); padding: 12px; border-bottom: 1px solid var(--border); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 20px;">
  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">
    <input type="radio" name="pr-modo" value="individual" checked onchange="togglePresencaModo()"> Lançamento Individual
  </label>
  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">
    <input type="radio" name="pr-modo" value="massa" onchange="togglePresencaModo()"> Lançamento em Massa 🚀
  </label>
</div>
<div class="form-grid">
  <div class="form-group"><label class="form-label">Data *</label><input type="date" class="form-control" id="pr-data">
  </div>
  <div class="form-group"><label class="form-label">Obra *</label><select class="form-control" id="pr-obra" onchange="filterTrabByObra()"></select>
  </div>
  <div class="form-group" id="pr-indiv-grp"><label class="form-label">Trabalhador *</label>
    <select class="form-control" id="pr-trab" onchange="fillTrabInfo()"></select>
  </div>
  <!-- Contêiner para Seleção em Massa -->
  <div id="pr-massa-grp" class="form-full" style="display:none; margin-bottom: 15px;">
    <label class="form-label" style="display: flex; justify-content: space-between; align-items: center;">
      <span>Selecione os Funcionários Presentes:</span>
      <button class="btn btn-sm" style="font-size: 11px; padding: 2px 8px; background: transparent; border: 1px solid var(--border);" onclick="selectAllTrabs(true)">Marcar Todos</button>
    </label>
    <div id="pr-lista-trabs-massa" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto;">
      <!-- Checkboxes injetados via JS -->
    </div>
  </div>
  <div class="form-group"><label class="form-label">Função</label><input class="form-control" id="pr-funcao" readonly>
  </div>
  <div class="form-group"><label class="form-label">Frente Serviço</label><input class="form-control" id="pr-frente"
      placeholder="Alvenaria"></div>
  <div class="form-group"><label class="form-label">Presença</label>
    <select class="form-control" id="pr-presenca" onchange="togglePresenca()">
      <option>Presente</option>
      <option>Falta</option>
      <option>Meio período</option>
    </select>
  </div>
  <div class="form-group" id="pr-entrada-grp"><label class="form-label">Entrada</label><input type="time"
      class="form-control" id="pr-entrada" value="07:00"></div>
  <div class="form-group" id="pr-saida-grp"><label class="form-label">Saída</label><input type="time"
      class="form-control" id="pr-saida" value="17:00" onchange="calcPresenca()"></div>
  <div class="form-group"><label class="form-label">H. Normais</label><input type="number" step="0.5"
      class="form-control" id="pr-hnorm" onchange="calcTotalManual()"></div>
  <div class="form-group" id="pr-hextra-grp"><label class="form-label">H. Extra</label><input type="number" step="0.5" class="form-control"
      id="pr-hextra" onchange="calcTotalManual()"></div>
  <div class="form-group"><label class="form-label">Diária (R$)</label><input type="number" class="form-control"
      id="pr-diaria" readonly></div>
  <div class="form-group"><label class="form-label">Total Dia (R$)</label><input type="number" step="0.01"
      class="form-control" id="pr-total"></div>
  <div class="form-group" id="pr-almoco-grp"><label class="form-label">Almoçou na Obra?</label>
    <select class="form-control" id="pr-almoco">
      <option value="Não">Não</option>
      <option value="Sim">Sim</option>
    </select>
  </div>
  <div class="form-group form-full"><label class="form-label">Justif. Falta / Obs.</label><input class="form-control"
      id="pr-obs"></div>
  <div class="form-group"><label class="form-label">Status Pgto</label>
    <select class="form-control" id="pr-pgto-status" onchange="toggleParcial('pr')">
      <option>Pendente</option>
      <option>Pago</option>
      <option>Parcial</option>
      <option>Atrasado</option>
    </select>
  </div>
  <div class="form-group" id="pr-parcial-grp" style="display:none"><label class="form-label">Vl. Pago (Parcial)</label><input type="number" step="0.01" class="form-control" id="pr-valpago" oninput="calcParcial('pr')"></div>
  <div id="pr-parcial-msg" class="form-full" style="display:none; color: var(--orange); font-size: 13px; font-weight: bold; margin-bottom: 10px; padding: 5px; background: rgba(245, 158, 11, 0.1); border-radius: 4px;"></div>
  <div class="form-group"><label class="form-label">Lançado por</label><input class="form-control" id="pr-lancador"
      placeholder="Mestre João"></div>
</div>
<div class="modal-footer" style="flex-wrap: wrap;">
  <button class="btn btn-secondary" onclick="closeModal('modal-presenca')">Cancelar</button>
  <div style="flex-grow:1"></div>
  <button class="btn btn-secondary" style="border:1px solid var(--primary); color:var(--primary); background:transparent" onclick="savePresenca(true)">Salvar e Adicionar Próximo</button>
  <button class="btn btn-primary" onclick="savePresenca()">Salvar Fechando</button>
</div>
