<div class="modal-header"><span class="modal-title">👷 Novo Trabalhador</span><button class="modal-close" onclick="closeModal('modal-trabalhador')">×</button></div>
<div class="form-grid">
  <div class="form-group"><label class="form-label">Cód. *</label><input class="form-control" id="tr-cod" placeholder="TR001"></div>
  <div class="form-group"><label class="form-label">Nome Completo *</label><input class="form-control" id="tr-nome"></div>
  <div class="form-group"><label class="form-label">CPF</label><input class="form-control" id="tr-cpf" placeholder="***.456.789-**"></div>
  <div class="form-group"><label class="form-label">Função</label><input class="form-control" id="tr-funcao" placeholder="Pedreiro"></div>
  <div class="form-group"><label class="form-label">Vínculo</label>
    <select class="form-control" id="tr-vinculo"><option>CLT</option><option>Informal</option><option>Empreiteiro</option></select></div>
  <div class="form-group"><label class="form-label">Empreiteiro/Equipe</label><input class="form-control" id="tr-equipe" placeholder="Própria"></div>
  <div class="form-group"><label class="form-label">Obra(s)</label><input class="form-control" id="tr-obras" placeholder="OB001"></div>
  <div class="form-group"><label class="form-label">Diária/Salário (R$)</label><input type="number" class="form-control" id="tr-diaria"></div>
  <div class="form-group"><label class="form-label">Forma Pgto</label>
    <select class="form-control" id="tr-pgto"><option>PIX</option><option>Dinheiro</option><option>Transferência</option><option>Boleto</option></select></div>
  <div class="form-group"><label class="form-label">Tipo Chave PIX</label>
    <select class="form-control" id="tr-pixtipo"><option value="cpf">CPF</option><option value="email">E-mail</option><option value="telefone">Telefone</option><option value="aleatoria">Chave Aleatória</option></select></div>
  <div class="form-group"><label class="form-label">Chave PIX</label><input class="form-control" id="tr-pixkey" placeholder="000.000.000-00 ou e-mail"></div>
  <div class="form-group"><label class="form-label">Contato</label><input class="form-control" id="tr-contato"></div>
  <div class="form-group"><label class="form-label">Status</label>
    <select class="form-control" id="tr-status"><option>Ativo</option><option>Inativo</option><option>Afastado</option></select></div>
  <div class="form-group"><label class="form-label">Data Admissão</label><input type="date" class="form-control" id="tr-admissao"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" onclick="closeModal('modal-trabalhador')">Cancelar</button>
  <button class="btn btn-primary" onclick="saveTrabalhador()">Salvar</button>
</div>
