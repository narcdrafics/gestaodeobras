name = "gestaodeobras-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# Roteamento: intercepta TODOS os subdomínios de obrareal.com
routes = [
  { pattern = "obrareal.com/*", zone_name = "obrareal.com" },
  { pattern = "*.obrareal.com/*", zone_name = "obrareal.com" }
]

