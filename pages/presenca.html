<div class="page-header">
  <div class="page-title">Controle de Presença <small>Lançado pelo Mestre</small></div>
  <button class="btn btn-primary" onclick="openModal('modal-presenca')">+ Lançar Presença</button>
</div>
<div class="kpi-grid" id="pres-kpi"></div>
<div id="almoco-avulso-container" style="margin-bottom:16px"></div>
<div class="table-wrap">
  <div class="table-toolbar">
    <h3>Registros de Presença</h3>
    <div class="toolbar-right" style="display:flex;gap:10px;align-items:center;">
      <select id="pres-group-select" class="form-control" style="width:auto;padding:8px;border-radius:6px;font-size:13px" onchange="if(typeof renderPresenca==='function')renderPresenca()">
        <option value="trab" selected>Agrupar por Peão</option>
        <option value="obra">Agrupar por Obra</option>
        <option value="">Sem Agrupamento (Plana)</option>
      </select>
      <select id="pres-sort-select" class="form-control" style="width:auto;padding:8px;border-radius:6px;font-size:13px" onchange="if(typeof renderPresenca==='function')renderPresenca()">
        <option value="data_desc">Data (Recentes)</option>
        <option value="data_asc">Data (Antigas)</option>
      </select>
      <input class="search-input" placeholder="Buscar..." oninput="filterTable('pres-tbody', this.value, [0,2,3])">
    </div>
  </div>
  <table>
    <thead><tr><th>Data</th><th>Obra</th><th>Trabalhador</th><th>Função</th><th>Frente</th><th>Entrada</th><th>Saída</th><th>H.Norm.</th><th>H.Extra</th><th>Almoço</th><th>Presença</th><th>Diária</th><th>Total Dia</th><th>Lançado por</th><th>Ações</th></tr></thead>
    <tbody id="pres-tbody"></tbody>
  </table>
</div>
<div class="table-wrap" style="margin-top:16px">
  <div class="table-toolbar"><h3>Consolidado de Almoços (Hoje/Semana)</h3></div>
  <div id="pres-almocos" style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px"></div>
</div>
<div class="table-wrap" style="margin-top:16px">
  <div class="table-toolbar"><h3>Totalizadores — Fechamento</h3></div>
  <div id="pres-totais" style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px"></div>
</div>
<div class="table-wrap" style="margin-top:16px">
  <div class="table-toolbar"><h3>Pagamentos Pendentes da Semana (Por Obra)</h3></div>
  <div id="pres-pgto-pendentes" style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px"></div>
</div>
