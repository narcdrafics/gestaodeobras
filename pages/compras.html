<div class="page-header">
  <div class="page-title">Compras <small>Solicitação → Aprovação → Pedido → Recebimento</small></div>
  <button class="btn btn-primary" onclick="openModal('modal-compra')">+ Nova Compra</button>
</div>
<div class="table-wrap">
  <div class="table-toolbar">
    <h3>Controle de Compras</h3>
    <div class="toolbar-right">
      <input class="search-input" placeholder="Buscar..." oninput="filterTable('compras-tbody', this.value, [1,2,3])">
    </div>
  </div>
  <table>
    <thead><tr><th>Nº Ped.</th><th>Data Solic.</th><th>Obra</th><th>Material/Serviço</th><th>Qtd.</th><th>Unid.</th><th>Status</th><th>Fornecedor</th><th>Vl. Total</th><th>Prazo Entrega</th><th>Recebido?</th><th>Ações</th></tr></thead>
    <tbody id="compras-tbody"></tbody>
  </table>
</div>
