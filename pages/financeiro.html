<div class="page-header">
  <div class="page-title">Financeiro <small>Previsto × Realizado</small></div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-secondary" style="border-color:var(--green); color:var(--green); font-weight:600;" onclick="prepareLotePgto()">💸 Fechar Folha (Lote)</button>
    <button class="btn btn-primary" onclick="openModal('modal-financeiro')">+ Novo Lançamento</button>
  </div>
</div>
<div class="fin-summary" id="fin-summary"></div>
<div class="table-wrap">
  <div class="table-toolbar">
    <h3>Lançamentos Financeiros</h3>
    <div class="toolbar-right">
      <input class="search-input" placeholder="Buscar..." oninput="filterTable('fin-tbody', this.value, [1,4,5])">
    </div>
  </div>
  <table>
    <thead><tr><th>Data</th><th>Obra</th><th>Etapa</th><th>Tipo Custo</th><th>Descrição</th><th>Fornec./Benef.</th><th>Vl. Prev.</th><th>Vl. Real.</th><th>Diferença</th><th>Forma Pgto</th><th>Status</th><th>NF</th><th>Ações</th></tr></thead>
    <tbody id="fin-tbody"></tbody>
  </table>
</div>
